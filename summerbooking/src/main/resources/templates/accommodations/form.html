<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <nav style="
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    color:white;
">

        <div>Summer Booking</div>

        <div style="display:flex; gap:20px;">

            <a th:href="@{/}"
               style="color:white;">Početna</a>

            <a th:href="@{/accommodations}"
               style="color:white;">Smještaji</a>

        </div>

    </nav>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smještaj — forma</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            background: linear-gradient(180deg,
                #ddf0fa 0%, #b8dff5 28%, #7ec8e8 52%,
                #4aadd4 68%, #2190bc 82%, #1378a0 100%
            );
            background-attachment: fixed;
        }

        .sea {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 46%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .sea::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(18,100,145,0) 0%,
                rgba(10,70,110,0.45) 60%,
                rgba(5,45,80,0.7) 100%
            );
        }

        .sea::after {
            content: '';
            position: absolute;
            top: 10%; left: 20%;
            width: 60%; height: 30%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%,100% { opacity: 0.6; transform: scaleX(1); }
            50%      { opacity: 1;   transform: scaleX(1.15); }
        }

        .wave { position: absolute; width: 200%; left: 0; }
        .w1 { top: -2px; animation: wm 7s  linear infinite;         opacity: 0.55; }
        .w2 { top: 18%;  animation: wm 11s linear infinite reverse;  opacity: 0.35; }
        .w3 { top: 34%;  animation: wm 9s  linear infinite 2s;       opacity: 0.25; }
        .w4 { top: 54%;  animation: wm 14s linear infinite reverse;   opacity: 0.2;  }

        @keyframes wm {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* === LAYOUT === */
        .page {
            position: relative;
            z-index: 10;
            max-width: 580px;
            margin: 0 auto;
            padding: 60px 32px 120px;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 300;
            color: rgba(11,63,96,0.5);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color 0.2s;
            opacity: 0;
            animation: appear 0.6s ease forwards 0s;
        }
        .back:hover { color: #1578a0; }

        .page-header {
            margin-bottom: 36px;
            opacity: 0;
            animation: appear 0.6s ease forwards 0.1s;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(10,60,100,0.5);
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 38px;
            font-weight: 400;
            color: #0b3f60;
            line-height: 1;
        }

        h1 em { font-style: italic; color: #1578a0; }

        /* === CARD === */
        .card {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.7);
            padding: 36px;
            opacity: 0;
            animation: appear 0.6s ease forwards 0.25s;
        }

        /* === FORM FIELDS === */
        .field {
            margin-bottom: 24px;
        }

        .field:last-of-type {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(11,63,96,0.55);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(11,63,96,0.15);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: #0b3f60;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            appearance: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: rgba(21,120,160,0.45);
            background: rgba(255,255,255,0.8);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(11,63,96,0.3);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.6;
        }

        /* Price field with € hint */
        .field-price {
            position: relative;
        }

        .field-price input {
            padding-right: 52px;
        }

        .price-unit {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: 300;
            color: rgba(11,63,96,0.35);
            pointer-events: none;
        }

        /* === SUBMIT === */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0b3f60;
            border: none;
            border-radius: 40px;
            color: #ceeaf6;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-submit:hover { background: #1578a0; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }

        @keyframes appear {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="sea">
    <svg class="wave w1" viewBox="0 0 1440 55" preserveAspectRatio="none">
        <path d="M0,28 C200,8 400,48 600,28 C800,8 1000,48 1200,28 C1320,14 1380,36 1440,28 L1440,55 L0,55 Z" fill="rgba(255,255,255,0.55)"/>
    </svg>
    <svg class="wave w2" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C240,10 480,40 720,25 C960,10 1200,40 1440,25 L1440,50 L0,50 Z" fill="rgba(255,255,255,0.3)"/>
    </svg>
    <svg class="wave w3" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C180,38 360,12 540,25 C720,38 900,12 1080,25 C1260,38 1360,18 1440,25 L1440,50 L0,50 Z" fill="rgba(255,255,255,0.22)"/>
    </svg>
    <svg class="wave w4" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C300,14 600,36 900,25 C1200,14 1320,34 1440,25 L1440,50 L0,50 Z" fill="rgba(180,225,248,0.18)"/>
    </svg>
</div>

<div class="page">

    <a th:href="@{/accommodations}" href="/accommodations" class="back">
        ← Natrag na listu
    </a>

    <div class="page-header">
        <p class="eyebrow">Jadran &bull; Hrvatska</p>
        <h1>Novi <em>smještaj</em></h1>
    </div>

    <div class="card">
        <form th:action="@{/accommodations}"
              th:object="${accommodation}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <!-- NAME -->
            <div class="field">
                <label>Naziv</label>

                <input type="text"
                       th:field="*{name}"
                       placeholder="npr. Apartman Sunce" />

                <p th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"
                   style="color:red; font-size:12px; margin-top:6px;">
                </p>
            </div>

            <!-- LOCATION -->
            <div class="field">
                <label>Lokacija</label>

                <input type="text"
                       th:field="*{location}"
                       placeholder="npr. Hvar" />

                <p th:if="${#fields.hasErrors('location')}"
                   th:errors="*{location}"
                   style="color:red; font-size:12px; margin-top:6px;">
                </p>
            </div>

            <!-- PRICE -->
            <div class="field">
                <label>Cijena po noći</label>

                <div class="field-price">

                    <input type="number"
                           step="0.01"
                           th:field="*{pricePerNight}"
                           placeholder="0.00" />

                    <span class="price-unit">€</span>

                </div>

                <p th:if="${#fields.hasErrors('pricePerNight')}"
                   th:errors="*{pricePerNight}"
                   style="color:red; font-size:12px; margin-top:6px;">
                </p>
            </div>

            <!-- DESCRIPTION -->
            <div class="field">
                <label>Opis</label>

                <textarea th:field="*{description}"
                          placeholder="Kratki opis smještaja..."></textarea>

                <p th:if="${#fields.hasErrors('description')}"
                   th:errors="*{description}"
                   style="color:red; font-size:12px; margin-top:6px;">
                </p>
            </div>

            <button type="submit" class="btn-submit">
                Spremi
            </button>

        </form>
    </div>

</div>

</body>
</html>
