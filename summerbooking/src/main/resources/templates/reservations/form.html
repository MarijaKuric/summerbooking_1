<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nova rezervacija</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Nova rezervacija</h1>

<form th:action="@{/reservations}"
      th:object="${reservation}"
      method="post">

    <input type="hidden"
           th:field="*{id}" />

    <input type="hidden"
           th:field="*{accommodation.id}" />

    <div class="mb-3">

        <label>Ime gosta</label>

        <input type="text"
               th:field="*{guestName}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Datum od</label>

        <input type="date"
               th:field="*{startDate}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Datum do</label>

        <input type="date"
               th:field="*{endDate}"
               class="form-control">

    </div>

    <button type="submit"
            class="btn btn-primary">

        Spremi rezervaciju

    </button>

</form>

</body>
</html>
