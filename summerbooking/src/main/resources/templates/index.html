<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ljetovanje na moru</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg,
                #ddf0fa 0%,
                #b8dff5 28%,
                #7ec8e8 52%,
                #4aadd4 68%,
                #2190bc 82%,
                #1378a0 100%
            );
        }

        /* === SEA SURFACE === */
        .sea {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 46%;
            z-index: 1;
            overflow: hidden;
        }

        /* Deep water base */
        .sea::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(18, 100, 145, 0) 0%,
                rgba(10, 70, 110, 0.45) 60%,
                rgba(5, 45, 80, 0.7) 100%
            );
        }

        /* Light reflections on water */
        .sea::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 60%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 70%);
            animation: shimmer 5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.6; transform: scaleX(1); }
            50%       { opacity: 1;   transform: scaleX(1.15); }
        }

        .wave {
            position: absolute;
            width: 200%;
            left: 0;
        }

        /* Main wave layers */
        .w1 { top: -2px; animation: wm 7s linear infinite;         opacity: 0.55; }
        .w2 { top: 18%;  animation: wm 11s linear infinite reverse; opacity: 0.35; }
        .w3 { top: 34%;  animation: wm 9s linear infinite 2s;       opacity: 0.25; }
        .w4 { top: 54%;  animation: wm 14s linear infinite reverse;  opacity: 0.2; }

        @keyframes wm {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* === CONTENT === */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 24px;
            margin-bottom: 8vh;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(10, 60, 100, 0.55);
            margin-bottom: 18px;
            opacity: 0;
            animation: appear 0.7s ease forwards 0.2s;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(52px, 8vw, 96px);
            font-weight: 400;
            line-height: 1.0;
            color: #0b3f60;
            margin-bottom: 28px;
            opacity: 0;
            animation: appear 0.7s ease forwards 0.4s;
        }

        h1 em {
            font-style: italic;
            color: #1578a0;
        }

        .sub {
            font-size: 15px;
            font-weight: 300;
            color: rgba(12, 58, 90, 0.6);
            margin-bottom: 40px;
            opacity: 0;
            animation: appear 0.7s ease forwards 0.55s;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 34px;
            background: #0b3f60;
            border-radius: 40px;
            color: #ceeaf6;
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.4px;
            transition: background 0.3s, transform 0.2s;
            opacity: 0;
            animation: appear 0.7s ease forwards 0.7s;
        }

        .btn:hover { background: #1578a0; transform: translateY(-2px); }
        .btn svg   { transition: transform 0.25s; }
        .btn:hover svg { transform: translateX(3px); }

        /* === STATS === */
        .stats {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 40px;
            align-items: center;
            opacity: 0;
            animation: appear 0.7s ease forwards 1s;
        }

        .stat {
            text-align: center;
        }

        .stat-n {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            line-height: 1;
        }

        .stat-l {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(200, 235, 252, 0.55);
            margin-top: 4px;
        }

        .stat-div {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.2);
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .stats { animation: appear-stats 0.7s ease forwards 1s; }
        @keyframes appear-stats {
            from { opacity: 0; transform: translateX(-50%) translateY(14px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .stats {
    display: flex;
    gap: 20px;
    margin-top: 40px;
}

.stat-card {
    flex: 1;
    padding: 30px;
    border-radius: 18px;
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(10px);
    text-align: center;
}

.stat-card h2 {
    font-size: 42px;
    color: #0b3f60;
    font-family: 'DM Serif Display', serif;
}

.stat-card p {
    color: rgba(11,63,96,0.6);
}
    </style>
</head>
<body>

<!-- Sea -->
<div class="sea">
    <svg class="wave w1" viewBox="0 0 1440 55" preserveAspectRatio="none">
        <path d="M0,28 C200,8 400,48 600,28 C800,8 1000,48 1200,28 C1320,14 1380,36 1440,28 L1440,55 L0,55 Z" fill="rgba(255,255,255,0.55)"/>
    </svg>
    <svg class="wave w2" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C240,10 480,40 720,25 C960,10 1200,40 1440,25 L1440,50 L0,50 Z" fill="rgba(255,255,255,0.3)"/>
    </svg>
    <svg class="wave w3" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C180,38 360,12 540,25 C720,38 900,12 1080,25 C1260,38 1360,18 1440,25 L1440,50 L0,50 Z" fill="rgba(255,255,255,0.22)"/>
    </svg>
    <svg class="wave w4" viewBox="0 0 1440 50" preserveAspectRatio="none">
        <path d="M0,25 C300,14 600,36 900,25 C1200,14 1320,34 1440,25 L1440,50 L0,50 Z" fill="rgba(180,225,248,0.18)"/>
    </svg>
</div>

<!-- Main content -->
<div class="content">
    <p class="eyebrow">Istra &bull; Hrvatska</p>

    <h1>Gdje ćeš<br><em>ovog ljeta?</em></h1>

    <a th:href="@{/accommodations}" href="/accommodations" class="btn">
        Pogledaj smještaje
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
    </a>
</div>

<div class="stats">

    <div class="stat-card">
        <h2 th:text="${accommodationCount}"></h2>
        <p>Smještaja</p>
    </div>


</div>



</body>
</html>
